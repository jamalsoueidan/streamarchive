<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Green glow at top -->
    <radialGradient id="glowCenter" cx="50%" cy="15%" r="50%">
      <stop offset="0%" style="stop-color:#1b9345;stop-opacity:0.15"/>
      <stop offset="60%" style="stop-color:#1b9345;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#1b9345;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Subtle green glow behind grid -->
  <ellipse cx="50%" cy="15%" rx="600" ry="300" fill="url(#glowCenter)"/>

  <!-- Grid lines - vertical -->
  <line x1="0" y1="0" x2="0" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="80" y1="0" x2="80" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="160" y1="0" x2="160" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="240" y1="0" x2="240" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="320" y1="0" x2="320" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="480" y1="0" x2="480" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.12"/>
  <line x1="560" y1="0" x2="560" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="640" y1="0" x2="640" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="800" y1="0" x2="800" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="880" y1="0" x2="880" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="960" y1="0" x2="960" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.12"/>
  <line x1="1040" y1="0" x2="1040" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1120" y1="0" x2="1120" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1200" y1="0" x2="1200" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1280" y1="0" x2="1280" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1360" y1="0" x2="1360" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1440" y1="0" x2="1440" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.12"/>
  <line x1="1520" y1="0" x2="1520" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1600" y1="0" x2="1600" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1680" y1="0" x2="1680" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1760" y1="0" x2="1760" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1840" y1="0" x2="1840" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="1920" y1="0" x2="1920" y2="600" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>

  <!-- Grid lines - horizontal -->
  <line x1="0" y1="0" x2="1920" y2="0" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="80" x2="1920" y2="80" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="160" x2="1920" y2="160" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="240" x2="1920" y2="240" stroke="#1b9345" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="320" x2="1920" y2="320" stroke="#1b9345" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="1920" y2="400" stroke="#1b9345" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="480" x2="1920" y2="480" stroke="#1b9345" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="560" x2="1920" y2="560" stroke="#1b9345" stroke-width="0.5" opacity="0.03"/>

  <!-- Animated glow pulses at grid intersections -->
  <circle cx="480" cy="80" r="3" fill="#1b9345" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;5;2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="960" cy="160" r="3" fill="#1b9345" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;6;2" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1440" cy="80" r="3" fill="#1b9345" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;5;2" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="240" r="3" fill="#1b9345" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="5s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1200" cy="240" r="3" fill="#1b9345" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;5;2" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="160" r="3" fill="#1b9345" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="3.8s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="3.8s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1680" cy="160" r="3" fill="#1b9345" opacity="0">
    <animate attributeName="opacity" values="0;0.25;0" dur="4.2s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="4.2s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Scanning line animation - horizontal sweep -->
  <line x1="0" y1="0" x2="1920" y2="0" stroke="#1b9345" stroke-width="1" opacity="0.15">
    <animate attributeName="y1" values="0;300;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;300;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="8s" repeatCount="indefinite"/>
  </line>
</svg>
