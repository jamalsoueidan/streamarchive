<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main background: dark with green gradient sides -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#54ff5b"/>
      <stop offset="40%" style="stop-color:#1a1a2e"/>
      <stop offset="60%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#b7ff6b"/>
    </linearGradient>

    <!-- Archive icon accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#54ff5b"/>
      <stop offset="100%" style="stop-color:#b7ff6b"/>
    </linearGradient>

    <!-- Glow filter for screen -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Screen inner gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1e"/>
      <stop offset="100%" style="stop-color:#070710"/>
    </linearGradient>

    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Dark center overlay to make gradient feel like edge-lit -->
  <rect width="512" height="512" rx="108" fill="#111827" opacity="0.78"/>

  <!-- Green left edge bar -->
  <rect x="0" y="0" width="18" height="512" rx="0" fill="#54ff5b" opacity="0.9" clip-path="url(#roundedClip)"/>
  <!-- Green right edge bar -->
  <rect x="494" y="0" width="18" height="512" rx="0" fill="#b7ff6b" opacity="0.9" clip-path="url(#roundedClip)"/>

  <!-- Screen frame -->
  <rect x="60" y="98" width="392" height="238" rx="24" fill="#ffffff" opacity="0.08"/>
  <rect x="60" y="98" width="392" height="238" rx="24" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.9"/>

  <!-- Inner screen -->
  <rect x="76" y="114" width="360" height="206" rx="14" fill="url(#screenGrad)"/>

  <!-- Play button circle -->
  <circle cx="256" cy="217" r="62" fill="url(#accentGrad)" opacity="0.15"/>
  <circle cx="256" cy="217" r="62" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>

  <!-- Play triangle -->
  <polygon points="242,192 242,242 290,217" fill="url(#accentGrad)"/>

  <!-- StreamArchive text -->
  <text x="256" y="402" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="40" font-weight="800" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="-0.5">StreamArchive</text>
</svg>
