<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 200" preserveAspectRatio="none">
  <defs>
    <!-- Gradient glow fading downward below the arc -->
    <linearGradient id="glowDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#52FF94;stop-opacity:0.25"/>
      <stop offset="40%" style="stop-color:#1b9345;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </linearGradient>

    <!-- Arc line gradient - bright in center, fading at edges -->
    <linearGradient id="arcLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1b9345;stop-opacity:0.3"/>
      <stop offset="30%" style="stop-color:#52FF94;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#b7ff6b;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#52FF94;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1b9345;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="arcGlow" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gradient fill below the arc curve -->
  <path d="M0 30 Q960 130 1920 30 L1920 200 L0 200 Z" fill="url(#glowDown)"/>

  <!-- Main arc line - one thick line from left to right -->
  <path d="M0 30 Q960 130 1920 30" fill="none" stroke="url(#arcLine)" stroke-width="3" filter="url(#arcGlow)"/>
</svg>
